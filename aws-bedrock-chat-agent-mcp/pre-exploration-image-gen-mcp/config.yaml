# MCP Image Generator Configuration

# AWS Configuration
aws:
  region: us-east-1
  
# S3 Configuration
s3:
  bucket: agentcore-generated-images
  presigned_url_expiry: 3600  # 1 hour in seconds
  
# Guardrail Configuration
guardrail:
  id: ""  # Set via environment variable
  version: "1"
  fail_closed: true  # Reject requests if guardrail fails
  
# Model Configuration
models:
  stability:
    model_id: stability.stable-diffusion-xl-v1
    default_width: 1024
    default_height: 1024
    default_steps: 50
    default_cfg_scale: 7.0
    max_width: 1024
    max_height: 1024
    
  titan:
    model_id: amazon.titan-image-generator-v1
    default_width: 1024
    default_height: 1024
    default_cfg_scale: 8.0
    max_width: 1024
    max_height: 1024
    quality: premium

# Server Configuration
server:
  host: 0.0.0.0
  port: 8080
  workers: 4
  timeout: 300  # 5 minutes
  
# Logging Configuration
logging:
  level: INFO
  format: json
  enable_cloudwatch: true
  
# Metrics Configuration
metrics:
  enable_cloudwatch: true
  namespace: MCP/ImageGenerator
  
# Rate Limiting (future implementation)
rate_limiting:
  enabled: false
  requests_per_minute: 10
  requests_per_hour: 100
  
# Caching (future implementation)
caching:
  enabled: false
  ttl: 86400  # 24 hours
  backend: redis
